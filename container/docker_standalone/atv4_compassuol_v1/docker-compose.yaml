---
name: atv4_compassuol

services:
  backend:
    image: aesthar/atv4_backend:${BACKEND_VERSION}
    expose:
    - "8000"
    networks:
    - backend
    restart: unless-stopped

  frontend:
    image: aesthar/atv4_frontend:${FRONTEND_VERSION}
    expose:
    - "80"
    depends_on:
    - backend
    networks:
    - backend
    - reverse-proxy
    environment:
    - BACKEND_SERVER_HOST=backend
    - BACKEND_SERVER_PORT=8000
    labels:
    - "traefik.enable=true"
    - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_public}"

    # HTTP router
    - "traefik.http.routers.frontend-http.rule=Host(`frontend.${DOMAIN}`)"
    - "traefik.http.routers.frontend-http.entrypoints=web"

    # Services
    - "traefik.http.services.frontend.loadbalancer.server.port=80"

    restart: unless-stopped

networks:
  backend:
  reverse-proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_public}
