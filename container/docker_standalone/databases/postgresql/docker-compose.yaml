name: dhcp-server

services:
  postgresql:
    image: postgres:18.4-alpine3.24
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_PASSWORD: "@lunoFat3c"
      POSTGRES_USER: aluno
    volumes:
      - postgresql_data:/var/lib/postgresql
      - type: bind
        source: ./initdb
        target: /docker-entrypoint-initdb.d
    networks:
      - backend

volumes:
  postgresql_data:

networks:
  backend:
