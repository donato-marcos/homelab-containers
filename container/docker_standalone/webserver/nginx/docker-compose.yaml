---
name: sites

services:
  nginx:
    image: nginx:stable-alpine3.23-slim
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./sites:/usr/share/nginx/sites
    networks:
      - frontend
      #- monitoramento
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"

      # HTTP router
      - "traefik.http.routers.sites-http.rule=Host(`site1.fatec.lab`) || Host(`site2.fatec.lab`) || Host(`site3.fatec.lab`)"
      - "traefik.http.routers.sites-http.entrypoints=web"
      - "traefik.http.routers.sites-http.service=sites-service"

      # Service
      - "traefik.http.services.sites-service.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  frontend:
    external: true
    name: traefik_public
  #monitoramento:
  #  external: true
  #  name: monitoramento_backend
