modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200, 301, 302]
      method: GET
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false

  http_2xx_with_host:
    prober: http
    timeout: 10s  
    http:
      valid_status_codes: [200, 301, 302]
      method: GET
      headers:
        Host: "{{ .Host }}"
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false


