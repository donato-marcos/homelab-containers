---
name: app-test

services:
  demo:
    build: .
    image: aesthar/go-demo:v1.0.0
    environment:
      APP_VERSION: "1.0.0"
      APP_COLOR: "#1b87f9"
      APP_LABEL: "Go Demo"
    expose:
      - "8080"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
          pids: 50
        reservations:
          cpus: "0.10"
          memory: 32M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "/app", "-healthcheck"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s
    read_only: true
    stop_grace_period: 10s
    networks:
      - net

  lb:
    image: nginx:stable-alpine3.23-slim
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      demo:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
    stop_grace_period: 5s
    networks:
      - net

networks:
  net:
    driver: bridge