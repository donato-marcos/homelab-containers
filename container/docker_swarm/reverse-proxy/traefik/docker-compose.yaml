---
services:
  # -------------------
  # Traefik reverse proxy
  # -------------------
  traefik:
    image: traefik:${VERSION:-v3.7.5}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=${TRAEFIK_NETWORK:-traefik_public}"

        # HTTP router
        - "traefik.http.routers.traefik-http.rule=Host(`traefik.${DOMAIN:-teste.local}`)"
        - "traefik.http.routers.traefik-http.entrypoints=web"
        - "traefik.http.routers.traefik-http.service=api@internal"

        ## HTTPS router
        #- "traefik.http.routers.traefik-https.rule=Host(`traefik.${DOMAIN}`)"
        #- "traefik.http.routers.traefik-https.entrypoints=websecure"
        #- "traefik.http.routers.traefik-https.service=api@internal"
        #- "traefik.http.routers.traefik-https.tls=true"
        #- "traefik.http.routers.traefik-https.tls.certresolver=${MYRESOLVER:-staging}"

        # Service
        #- "traefik.http.services.traefik-service.loadBalancer.server.port=8080"
    env_file:
      - .env.secrets

    networks:
      - traefik_public
    expose:
      - "8080"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      #- target: 443
      #  published: 443
      #  protocol: tcp
      #  mode: host

    configs:
      - source: traefik_config
        target: /etc/traefik/traefik.yaml
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: volume
        source: dynamic_config
        target: /etc/traefik/dynamic_conf.d
        read_only: true
      - type: volume
        source: traefik_certificates
        target: /${VOLUME_CERTS:-letsencrypt}

  whoami:
    image: traefik/whoami
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=${TRAEFIK_NETWORK:-traefik_public}"

        # HTTP router
        - "traefik.http.routers.whoami-http.rule=Host(`whoami.${DOMAIN:-teste.local}`)"
        - "traefik.http.routers.whoami-http.entrypoints=web"

        # Service
        - "traefik.http.services.whoami-service.loadBalancer.server.port=80"
    networks:
      - traefik_public

networks:
  traefik_public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_public}

configs:
  traefik_config:
    file: ./traefik.yaml
volumes:
  dynamic_config:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=172.16.211.50,rw,nolock,hard,nfsvers=4"
      device: ":/mnt/swarm_data/traefik"
  traefik_certificates:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=172.16.211.50,rw,nolock,hard,nfsvers=4"
      device: ":/mnt/swarm_data/traefik"
