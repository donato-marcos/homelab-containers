# API e Dashbord (Para produção, deixe comentado com #)
api:
  dashboard: true
  insecure: true

# Providers Docker Swarm
providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik_public
    watch: true
  file:
    directory: "/etc/traefik/dynamic_conf.d"
    watch: true

# Entrypoints
entryPoints:
  web:
    address: ":80"
